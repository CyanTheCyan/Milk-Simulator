<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factory</title>

<style>
body {
  margin:0;
  background: url("background.png");
  background-size: cover;
  background-position: center;
  overflow:hidden;
}

/* FADE */
#fade {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:999;
}

/* BACK */
#back {
  position:absolute;
  left:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}

/* ITEMS */
.item {
  position:absolute;
  width:130px;
  cursor:grab;
  user-select:none;
}

/* LEFT */
#metal, #wire, #clip {
  left:120px;
  top:300px;
}
#wire, #clip { display:none; }

/* SMASH */
#smash1 {
  left:500px;
  top:380px;
  width:180px;
  position:absolute;
}
#smash2 {
  left:500px;
  top:200px;
  width:180px;
  position:absolute;
}

/* BENDER */
#bender {
  left:800px;
  top:300px;
  width:200px;
  position:absolute;
}

/* SELL */
#sell {
  position:absolute;
  right:80px;
  top:300px;
  padding:25px;
  font-size:26px;
  background:green;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="fade"></div>
<div id="back">⬅️</div>
<div id="sell">SELL</div>

<img src="metal.png" id="metal" class="item">
<img src="wire.png" id="wire" class="item">
<img src="paperclips.png" id="clip" class="item">

<img src="smash1.png" id="smash1">
<img src="smash2.png" id="smash2">
<img src="bender machine.png" id="bender">

<audio id="smashSound" src="smash.mp3"></audio>
<audio id="bendSound" src="bend.mp3"></audio>
<audio id="sellSound" src="sell.mp3"></audio>

<script>
// SAVE
let money = Number(localStorage.getItem("money") || 0);
let milk = Number(localStorage.getItem("milk") || 5);

// FADE BACK
document.getElementById("back").onclick = ()=>{
  document.getElementById("fade").style.opacity = 1;
  setTimeout(()=> location.href="index.html",400);
};

// SELL
document.getElementById("sell").onclick = ()=>{
  let clip = document.getElementById("clip");

  if(clip.style.display==="block"){
    document.getElementById("sellSound").play();

    money += 5;
    milk += 2;

    localStorage.setItem("money",money);
    localStorage.setItem("milk",milk);

    clip.style.display="none";
    document.getElementById("metal").style.display="block";
  }
};
</script>

</body>
</html>
