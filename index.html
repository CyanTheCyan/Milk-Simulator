<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Milk Game</title>

<style>
body { margin:0; overflow:hidden; background:#222; font-family:sans-serif; }

/* 💰 MONEY UI */
@font-face {
  font-family: comic;
  src: url("COMIC.ttf");
}

#money {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family: comic;
  font-size:40px;
  z-index:10;
}

/* HEALTH BAR */
#bar {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:25px;
  background:red;
}
#fill {
  height:100%;
  width:0%;
  background:lime;
}

/* FACTORY BUTTON */
#arrow {
  position:absolute;
  right:20px;
  top:50%;
  font-size:40px;
  cursor:pointer;
  z-index:10;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>
</head>

<body>

<div id="money">$0</div>
<div id="bar"><div id="fill"></div></div>
<div id="arrow">➡️</div>

<!-- SOUND -->
<audio id="slurp" src="sluuuurp.mp3"></audio>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

// SAVE
let money = Number(localStorage.getItem("money") || 0);
let milk = Number(localStorage.getItem("milk") || 5);

const moneyUI = document.getElementById("money");

// SCENE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight,0.1,1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LOADERS
const texLoader = new THREE.TextureLoader();
texLoader.setPath("./");

const gltfLoader = new GLTFLoader();
gltfLoader.setPath("./");

// BACKGROUND
const bgTex = texLoader.load("New Project (72).png");
const bg = new THREE.Mesh(
  new THREE.PlaneGeometry(4,4),
  new THREE.MeshBasicMaterial({map:bgTex})
);
bg.position.z = -1;
scene.add(bg);

// TEXTURE
const tex = texLoader.load("milk texture.png");
tex.flipY = false;

// MODEL
let milkModel;
gltfLoader.load("milk.glb",(gltf)=>{
  milkModel = gltf.scene;

  milkModel.traverse(c=>{
    if(c.isMesh){
      c.material = new THREE.MeshBasicMaterial({map:tex});
    }
  });

  milkModel.scale.set(0.4,0.4,0.4);
  scene.add(milkModel);
});

// HEALTH
let value = 50;
let displayValue = 50;
const fill = document.getElementById("fill");

// EFFECTS
let clickTimer = 0;
let shakePower = 0;

// DRAIN
setInterval(()=>{
  value -= 5;
  if(value < 0) value = 0;
},3000);

// CLICK
addEventListener("click",()=>{
  if(!milk || !milkModel) return;

  value += 10;
  if(value > 100) value = 100;

  milk--;
  localStorage.setItem("milk",milk);

  // 🔊 SOUND
  const s = document.getElementById("slurp");
  s.currentTime = 0;
  s.play();

  // 🎈 EFFECTS
  clickTimer = 1;
  shakePower = 0.1;
});

// FACTORY
document.getElementById("arrow").onclick = ()=>{
  location.href = "factory.html";
};

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  if(milkModel){

    // idle rotation
    milkModel.rotation.x += 0.005;
    milkModel.rotation.y += 0.007;

    // 🎈 balloon squash
    if(clickTimer > 0){
      let s = 1 + Math.sin(clickTimer * 10) * 0.2;

      milkModel.scale.set(
        0.4 * (1 + s*0.2),
        0.4 * (1 - s*0.1),
        0.4 * (1 + s*0.2)
      );

      clickTimer -= 0.05;
    } else {
      milkModel.scale.set(0.4,0.4,0.4);
    }
  }

  // 📳 SCREEN SHAKE
  camera.position.x = (Math.random()-0.5) * shakePower;
  camera.position.y = (Math.random()-0.5) * shakePower;
  shakePower *= 0.9;

  // 🌊 background sway
  bg.position.x = Math.sin(Date.now()*0.001)*0.1;
  bg.position.y = Math.cos(Date.now()*0.001)*0.1;

  // 💚 smooth health
  displayValue += (value - displayValue) * 0.1;
  fill.style.width = displayValue + "%";

  // 💰 update money always
  moneyUI.innerText = "$" + money;

  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
